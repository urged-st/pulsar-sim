<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pulsar Simulator</title>

<script src="https://cdn.jsdelivr.net/npm/p5@1.11.5/lib/p5.min.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
}
</style>
</head>
<body>

<script>


let pulsecount = 0;
let previousDetection = 0;


let presetSelect;

let pulsarAngle = 0;

let stars = [];

let cameraX = 0
let cameraY = 0;
let zoomLevel = 1;

let draggingView = false;
let draggingEarth = false;

let lastMouseX = 0;
let lastMouseY = 0;

let earthX = 600;
let earthY = -150;

let speedSlider;
let beamSlider;

let history = [];

let resetButton;

function setup()
{
    createCanvas(windowWidth, windowHeight);

    //create stars
    for (let i = 0; i < 20000; i++)
    {
        stars.push({
            x: random(-10000, 10000),
            y: random(-10000, 10000),
            size: random(1,3)
        });
    }

    //spin speed
    speedSlider = createSlider(
        0.005,
        0.1,
        0.02,
        0.001
    );

    speedSlider.position(20, 20);

    //beam width
    beamSlider = createSlider(
        0.05,
        0.5,
        0.15,
        0.01
    );

    speedSlider.input(() => {
        presetSelect.value("Custom");
    });

    beamSlider.input(() => {
        presetSelect.value("Custom");
    });

    resetButton = createButton("Reset View");
    resetButton.position(155, 125);
    resetButton.mousePressed(resetView);
    

    beamSlider.position(20, 55);

    presetSelect = createSelect();
    presetSelect.position(20, 125);
    presetSelect.option("Custom");
    presetSelect.option("Slow Pulsar");
    presetSelect.option("Typical Pulsar");
    presetSelect.option("Fast Pulsar");
    presetSelect.option("Millisecond Pulsar");

    presetSelect.selected("Typical Pulsar");

    presetSelect.changed(applyPreset);


    applyPreset();
}

function draw()
{
    background(0);

    if(draggingView)
    {
        cameraX -=
            (mouseX - lastMouseX) /
            zoomLevel;

        cameraY -=
            (mouseY - lastMouseY) /
            zoomLevel;

        lastMouseX = mouseX;
        lastMouseY = mouseY;
    }
    else if(draggingEarth)
    {
        earthX +=
            (mouseX - lastMouseX) /
            zoomLevel;

        earthY +=
            (mouseY - lastMouseY) /
            zoomLevel;

        lastMouseX = mouseX;
        lastMouseY = mouseY;    
    }

    push();
    
    translate(
        width / 2,
        height / 2
    );

    scale(zoomLevel);

    translate(
        -cameraX,
        -cameraY            
    );

    let rotationSpeed = speedSlider.value();

    let frequency = rotationSpeed * 60;

    let period = 1 / frequency;

    let beamWidth = beamSlider.value();

    let pulsarX = 0;
    let pulsarY = 0;

    pulsarAngle += rotationSpeed;

    //draw stars
    stroke(255);

    for(let star of stars)
    {
        strokeWeight(star.size);
        point(star.x, star.y);
    }

    //rotation axis
    stroke(180);
    strokeWeight(2);

    line(
        pulsarX,
        pulsarY - 130,
        pulsarX,
        pulsarY + 130
    );

    let observerAngle =
        atan2(
            earthY - pulsarY,
            earthX - pulsarX
        );

    let distanceToEarth =
        dist(
            pulsarX,
            pulsarY,
            earthX,
            earthY
        );    

    let diff1 =
        abs(
            atan2(
                sin(pulsarAngle - observerAngle),
                cos(pulsarAngle - observerAngle)
            )
        );

    let diff2 =
        abs(
            atan2(
                sin(
                    pulsarAngle + PI -
                    observerAngle
                ),
                cos(
                    pulsarAngle + PI -
                    observerAngle
                )
            )
        );

    let signalStrength =
        max(
            exp(
                -(diff1 * diff1) /
                (2 * beamWidth * beamWidth)
            ),
            exp(
                -(diff2 * diff2) /
                (2 * beamWidth * beamWidth)
            )
        );

    let distanceFactor =
        500 / distanceToEarth;

    distanceFactor = constrain(
        distanceFactor,
        0,
        1
    );

    signalStrength *= distanceFactor;

    let detected = signalStrength > 0.2;

    if(detected && !previousDetection)
    {
        pulsecount++;
    }

    previousDetection = detected;

    history.push(signalStrength);

    if(history.length > 500)
    {
        history.shift();
    }

    push();

    translate(
        pulsarX,
        pulsarY
    );

    rotate(pulsarAngle);

    //magnetic axis
    stroke(100,200,255);
    strokeWeight(3);

    line(0,-90,0,90);

    noStroke();

    //beam 1
    fill(100,200,255,45);

    arc(
        0,
        0,
        1800,
        1800,
        -beamWidth,
        beamWidth,
        PIE
    );

    //beam 2
    arc(
        0,
        0,
        1800,
        1800,
        PI - beamWidth,
        PI + beamWidth,
        PIE
    );

    pop();

    //observer line
    stroke(80);

    line(
        pulsarX,
        pulsarY,
        earthX,
        earthY
    );

    //pulsar glow
    noStroke();

    for(let r = 90; r > 0; r -= 5)
    {
        fill(
            120,
            180,
            255,
            7
        );

        circle(
            pulsarX,
            pulsarY,
            r
        );
    }

    //pulsar body
    fill(200,230,255);

    circle(
        pulsarX,
        pulsarY,
        34
    );

    //earth glow
    fill(
        255,
        100 + signalStrength * 155,
        100
    );

    circle(
        earthX,
        earthY,
        18
    );

    fill(255);
    textSize(16);

    text(
        "Earth",
        earthX + 15,
        earthY + 5
    );

    pop();

    //status
    textSize(26);

    if(signalStrength > 0.2)
    {
        fill(0,255,120);

        text(
            "SIGNAL DETECTED",
            20,
            110
        );

        
    }
    else
    {
        fill(255,80,80);

        text(
            "NO SIGNAL",
            20,
            110
        );
    }




    fill(255);

    textSize(14);

    text(
        "spin rate",
        170,
        33
    );

    text(
        "beam width",
        170,
        68
    );

    text(
        "signal: " +
        nf(signalStrength,1,3),
        20,
        140
    );

    text(   
            "period: " +
            nf(period,1,2) +
            "s",
            20,
            190
        );

    text(
            "frequency: " +
            nf(frequency,1,2) +
            "Hz",
            20,
            165
        );

    text(
        "distance: " +
        nf(distanceToEarth,1,0) +
        " px",
        20,
        240
    );


    text(
        "pulses detected: " +
        pulsecount,
        20,
        265
    )

    text(
        "preset: " +
        presetSelect.value(),
        20,
        215
    );
        
    //graph
    let graphX = 40;
    let graphY = height - 200;
    let graphW = 650;
    let graphH = 150;

    noFill();

    //gridlines
    stroke(60);
    strokeWeight(1);

    //horizontal
    for(let i = 0; i <= 5; i++)
    {
        let y =
            map(
                i,
                0,
                5,
                graphY + graphH,
                graphY
            );

        line(
            graphX,
            y,
            graphX + graphW,
            y
        );
    }

    //vertical
    for(let i = 0; i <= 10; i++)
    {
        let x =
            map(
                i,
                0,
                10,
                graphX,
                graphX + graphW
            );

        line(
            x,
            graphY,
            x,
            graphY + graphH
        );
    }

    //border
    stroke(255);

    rect(
        graphX,
        graphY,
        graphW,
        graphH
    );

    //waveform
    beginShape();

    stroke(0,255,120);
    strokeWeight(2);
    noFill();

    for(let i = 0; i < history.length; i++)
    {
        let x =
            map(
                i,
                0,
                history.length - 1,
                graphX,
                graphX + graphW
            );

        let y =
            map(
                history[i],
                0,
                1,
                graphY + graphH,
                graphY
            );

        vertex(x,y);
    }

    endShape();

    noStroke();
    fill(255);

    text(
        "received signal strength",
        graphX,
        graphY - 10
    );

    text(
        "1.0",
        graphX - 30,
        graphY + 5
    );

    text(
        "0.5",
        graphX - 30,
        graphY + graphH / 2 + 5
    );

    text(
        "0.0",
        graphX - 30,
        graphY + graphH + 5
    );

    


    

    noStroke();

    fill(255);

    text(
        "received signal strength",
        graphX,
        graphY - 10
    );
}

function windowResized()
{
    resizeCanvas(
        windowWidth,
        windowHeight
    );
}


function applyPreset()
{
    let preset = presetSelect.value();

    if(preset === "Slow Pulsar")
    {
        speedSlider.value(0.008);
        beamSlider.value(0.25);
    }
    else if(preset === "Typical Pulsar")
    {
        speedSlider.value(0.02);
        beamSlider.value(0.15);
    }
    else if(preset === "Fast Pulsar")
    {
        speedSlider.value(0.05);
        beamSlider.value(0.1);
    }
    else if(preset === "Millisecond Pulsar")
    {
        speedSlider.value(0.1);
        beamSlider.value(0.06);
    }
}

function resetView()
    {
        cameraX = 0;
        cameraY = 0;
        zoomLevel = 1;

        earthX = 600;
        earthY = -150;  
    }

function mousePressed()
{

    if(
    mouseX > 0 &&
    mouseX < 330 &&
    mouseY > 0 &&
    mouseY < 155
)
{
    return;
}   


    let earthScreenX = 
        width / 2 +
        (earthX - cameraX) * zoomLevel;
    let earthScreenY = 
        height / 2 + (earthY - cameraY) * zoomLevel;

    if(
        dist(
            mouseX,
            mouseY,
            earthScreenX,
            earthScreenY
        ) < 20
    )

    {
        draggingEarth = true;}
    

    else
    {
        draggingView = true;
    
    }
    lastMouseX = mouseX;
    lastMouseY = mouseY;
}

function mouseReleased()
{
    draggingView = false;
    draggingEarth = false;
}

function mouseWheel(event)
{
    if(event.delta > 0)
    {
        zoomLevel *= 0.9;
    }
    else
    {
        zoomLevel *= 1.1;
    }

    zoomLevel =
        constrain(
            zoomLevel,
            0.2,
            10
        );

    return false;
}

</script>

</body>
</html>
