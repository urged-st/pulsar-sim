<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pulsar Prototype</title>

<script src="https://cdn.jsdelivr.net/npm/p5@1.11.5/lib/p5.min.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}
</style>
</head>
<body>

<script>

let angle = 0;

let stars = [];

function setup()
{
    createCanvas(windowWidth, windowHeight);

    //generate stars
    for(let i = 0; i < 200; i++)
    {
        stars.push({
            x: random(width),
            y: random(height),
            size: random(1,3)
        });
    }
}

function draw()
{
    background(0);

    //draw stars
    stroke(255);

    for(let star of stars)
    {
        strokeWeight(star.size);
        point(star.x, star.y);
    }

    let x = width / 2;
    let y = height / 2;

    angle += 0.02;

    push();

    translate(x, y);
    rotate(angle);

    //draw beams
    noStroke();

    fill(100, 200, 255, 40);

    arc(
        0,
        0,
        1200,
        1200,
        -0.15,
        0.15,
        PIE
    );

    arc(
        0,
        0,
        1200,
        1200,
        PI - 0.15,
        PI + 0.15,
        PIE
    );

    pop();

    //draw glow
    noStroke();

    for(let r = 80; r > 0; r -= 5)
    {
        fill(120, 180, 255, 8);

        circle(
            x,
            y,
            r
        );
    }

    //draw pulsar
    fill(220, 235, 255);

    circle(
        x,
        y,
        30
    );
}

function windowResized()
{
    resizeCanvas(
        windowWidth,
        windowHeight
    );
}

</script>

</body>
</html>
